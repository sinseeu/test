<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>BREAKOUT 3D — HARD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #030308;   /* 사진 없을 때 폴백 다크 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      user-select: none;
    }

    /* ── 블러 배경사진 (게임 내내 깔림) — img 태그로 ORB 우회 ── */
    #bgPhoto {
      position: fixed;
      inset: -8%;                   /* 엣지 번짐 숨기기 */
      width: 116%; height: 116%;   /* inset -8% 보정 */
      z-index: 0;
      object-fit: cover;
      object-position: center 18%;
      filter: blur(6px) brightness(0.85) saturate(0.85);
      opacity: 0;
      transition: opacity 1.4s ease;
      pointer-events: none;
      display: block;
    }
    #bgPhoto.loaded { opacity: 0.6; }

    /* 게임 UI 요소는 bgPhoto 위에 */
    h1, #hud, #wrap, #tip { position:relative; z-index:1; }

    h1 {
      font-size: 2rem;
      letter-spacing: 10px;
      margin-bottom: 14px;
      background: linear-gradient(90deg, #6af4ff, #a78bfa, #6af4ff);
      background-size: 200%;
      animation: shimmer 3s linear infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px #6af4ff44);
    }
    @keyframes shimmer { from{background-position:0%} to{background-position:200%} }

    #hud { display:flex; gap:36px; margin-bottom:10px; }
    .hud-item { text-align:center; min-width:60px; }
    .hud-item .lbl { display:block; font-size:.62rem; color:#444; letter-spacing:2px; margin-bottom:2px; }
    .hud-item .val { font-size:1.05rem; color:#ddd; font-weight:bold; }

    canvas { display:block; border:1px solid #ffffff12; border-radius:2px; box-shadow:0 0 80px #000a; }
    #wrap { position:relative; z-index:1; }

    /* ── 게임 오버레이 ── */
    #overlay {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      text-align:center; padding:22px 40px;
      background:rgba(4,4,16,.88); border:1px solid #ffffff14;
      border-radius:10px; backdrop-filter:blur(6px);
      pointer-events:none; min-width:240px;
    }
    #overlay.hidden { display:none; }
    #overlay h2 { font-size:1.7rem; letter-spacing:4px; margin-bottom:10px; text-shadow:0 0 18px currentColor; }
    #overlay p  { font-size:.8rem; color:#666; letter-spacing:2px; line-height:1.8; }

    /* ── K-pop 사진 오버레이 (전체화면) ── */
    #photoOverlay {
      position:fixed; inset:0; z-index:999;
      background:#000;
      animation:fadeIn .5s ease;
    }
    #photoOverlay.hidden { display:none; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    /* 로딩 스피너 */
    #photoSpinner {
      position:absolute; inset:0; z-index:3;
      display:flex; align-items:center; justify-content:center;
      background:#0a0a14;
      transition:opacity .35s;
    }
    #photoSpinner.done { opacity:0; pointer-events:none; }

    .spin-ring {
      width:52px; height:52px;
      border:3px solid #1e1e2e;
      border-top-color:#c084fc;
      border-radius:50%;
      animation:spin .75s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* 전체화면 사진 */
    #idolImg {
      position:absolute; inset:0; z-index:1;
      width:100%; height:100%;
      object-fit:cover;
      object-position:center 18%;
      opacity:0; transition:opacity .55s ease;
    }
    #idolImg.loaded { opacity:1; }

    /* 상단 그라디언트 오버레이 */
    .photo-top {
      position:absolute; top:0; left:0; right:0; z-index:4;
      padding:28px 0 70px;
      background:linear-gradient(to bottom, rgba(0,0,0,.72) 0%, transparent 100%);
      display:flex; justify-content:center;
    }
    .clear-badge {
      font-size:1rem; letter-spacing:9px; color:#f7e733;
      text-shadow:0 0 22px #f7e733cc, 0 2px 8px rgba(0,0,0,.8);
      animation:pulse 1.1s ease-in-out infinite alternate;
    }
    @keyframes pulse { from{opacity:.75} to{opacity:1} }

    /* 하단 그라디언트 오버레이 */
    .photo-bottom {
      position:absolute; bottom:0; left:0; right:0; z-index:4;
      padding:70px 0 30px;
      background:linear-gradient(to top, rgba(0,0,0,.72) 0%, transparent 100%);
      display:flex; justify-content:center; align-items:flex-end;
    }
    .press-hint {
      font-size:.72rem; color:rgba(255,255,255,.55);
      letter-spacing:4px;
      animation:blink 1.2s step-end infinite;
    }
    @keyframes blink { 50%{opacity:0} }

    /* 치트 알림 */
    #cheatFlash {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:1.4rem; letter-spacing:6px; color:#f7e733;
      text-shadow:0 0 24px #f7e733;
      pointer-events:none; z-index:998;
      animation:cheatAnim .7s ease forwards;
    }
    @keyframes cheatAnim {
      0%  { opacity:1; transform:translate(-50%,-50%) scale(1); }
      100%{ opacity:0; transform:translate(-50%,-70%) scale(1.3); }
    }

    #tip { margin-top:12px; font-size:.7rem; color:#333; letter-spacing:1px; }
  </style>
</head>
<body>

<!-- 블러 배경사진 (img 태그 — CSS background보다 CORS 제약 없음) -->
<img id="bgPhoto" src="" alt="">

<h1>BREAKOUT 3D &nbsp;<span style="font-size:.7em;color:#ff6b6b;letter-spacing:6px;">HARD</span></h1>
<div id="hud">
  <div class="hud-item"><span class="lbl">SCORE</span><span class="val" id="score">0</span></div>
  <div class="hud-item"><span class="lbl">LEVEL</span><span class="val" id="level">1</span></div>
  <div class="hud-item"><span class="lbl">LIVES</span><span class="val" id="lives">❤❤❤</span></div>
  <div class="hud-item"><span class="lbl">BALLS</span><span class="val" id="ballcount">1</span></div>
</div>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="overlay"><h2 style="color:#6af4ff">BREAKOUT 3D</h2><p>SPACE 키로 시작</p></div>
</div>

<!-- K-pop 사진 오버레이 (전체화면) -->
<div id="photoOverlay" class="hidden">
  <div id="photoSpinner"><div class="spin-ring"></div></div>
  <img id="idolImg" src="" alt="">
  <div class="photo-top"><span class="clear-badge">✦ LEVEL CLEAR ✦</span></div>
  <div class="photo-bottom"><span class="press-hint">— 아무 키나 누르면 다음 레벨 —</span></div>
</div>

<div id="tip">← → 패들 이동 &nbsp;·&nbsp; SPACE 발사/정지 &nbsp;·&nbsp; ↑↓ 레벨 스킵</div>

<script>
// ── Canvas ──────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const COLS=10, ROWS=5, BW=60, BH=28, BGAP=6, PAD_X=16, PAD_TOP=42;
canvas.width  = COLS*(BW+BGAP)+BGAP+PAD_X*2;
canvas.height = 600;
const W=canvas.width, H=canvas.height;

// ── HUD ─────────────────────────────────────────────────────────
const scoreEl     = document.getElementById('score');
const levelEl     = document.getElementById('level');
const livesEl     = document.getElementById('lives');
const ballcountEl = document.getElementById('ballcount');
const overlay     = document.getElementById('overlay');
const photoOverlay = document.getElementById('photoOverlay');

// ── K-pop 개인 아이돌 — Wikimedia Commons 검색어 ─────────────────
// Commons는 로고/서명이 아닌 실제 인물 사진이 많음
const KPOP_IDOLS = [
  'Jisoo BLACKPINK singer',
  'Jennie Kim BLACKPINK',
  'Rosé BLACKPINK singer',
  'Lisa BLACKPINK singer',
  'Nayeon TWICE singer',
  'Jihyo TWICE singer',
  'Tzuyu TWICE singer',
  'Sana TWICE singer',
  'Momo TWICE singer',
  'Karina aespa singer',
  'Winter aespa singer',
  'Jang Wonyoung IVE singer',
  'An Yujin IVE singer',
  'Minji NewJeans singer',
  'Hanni NewJeans singer',
  'Irene Red Velvet singer',
  'Seulgi Red Velvet singer',
  'Wendy Red Velvet singer',
  'Joy Red Velvet singer',
  'Soyeon G-IDLE rapper',
  'Ryujin ITZY singer',
  'Yeji ITZY singer',
  'Sakura Kpop singer',
  'Kim Chaewon Kpop singer',
];

// 그룹 사진 폴백 제거 — 개인 클로즈업 사진 없으면 배경 없음(null)

function fetchTimeout(url, ms=6000) {
  const ctrl = new AbortController();
  const id   = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(id));
}

// 비포토 패턴 (로고·서명·앨범커버·무대·MV 등 제외)
const NON_PHOTO = /logo|signature|album|cover|stamp|flag|map|icon|poster|concert|stage|tour|mv|music.video|choreograph|handwriting|pictogram|symbol|coa|seal|\.svg/i;

async function tryFetchOneIdol(q) {
  // Wikimedia Commons 파일 검색 → 세로 비율 높은 개인 사진 URL 반환
  const sr = await fetchTimeout(
    'https://commons.wikimedia.org/w/api.php?' + new URLSearchParams({
      action:'query', list:'search',
      srsearch: q, srnamespace:'6', srlimit:'20',
      format:'json', origin:'*',
    }), 8000
  );
  if (!sr.ok) return null;
  const sd = await sr.json();

  const files = (sd.query?.search || [])
    .filter(f => /\.(jpg|jpeg|png)$/i.test(f.title) && !NON_PHOTO.test(f.title));
  if (!files.length) return null;

  const titles = files.slice(0, 8).map(f => f.title).join('|');
  const ir = await fetchTimeout(
    'https://commons.wikimedia.org/w/api.php?' + new URLSearchParams({
      action:'query', titles,
      prop:'imageinfo', iiprop:'url|dimensions',
      iiurlwidth:'900', format:'json', origin:'*',
    }), 8000
  );
  if (!ir.ok) return null;

  const id2 = await ir.json();
  const pages = Object.values(id2.query.pages)
    .sort((a, b) => {
      const ai = a.imageinfo?.[0], bi = b.imageinfo?.[0];
      return ((bi?.height / (bi?.width||1)) || 0) - ((ai?.height / (ai?.width||1)) || 0);
    });

  for (const page of pages) {
    const info = page.imageinfo?.[0];
    if (info?.thumburl && info.width >= 300 && info.height >= 300) return info.thumburl;
  }
  return null;
}

async function fetchKpopImage() {
  // 최대 3번 다른 아이돌로 시도
  const tried = new Set();
  for (let attempt = 0; attempt < 3; attempt++) {
    let idx;
    do { idx = Math.floor(Math.random() * KPOP_IDOLS.length); } while (tried.has(idx));
    tried.add(idx);
    try {
      const url = await tryFetchOneIdol(KPOP_IDOLS[idx]);
      if (url) return url;
    } catch(e) {
      console.warn('Commons fetch attempt', attempt+1, 'failed:', e);
    }
  }
  // 모든 시도 실패 → 배경 없음
  return null;
}

// ── 팔레트 ──────────────────────────────────────────────────────
const ROW_HUE = [355, 22, 50, 135, 205];
function brickPalette(row) {
  const h=ROW_HUE[row], s=88;
  return { top:`hsl(${h},${s}%,72%)`, main:`hsl(${h},${s}%,52%)`, side:`hsl(${h},${s}%,32%)`, glow:`hsl(${h},${s}%,52%)` };
}

// ── 게임 상태 ────────────────────────────────────────────────────
let state = 'idle'; // idle | playing | paused | dead | over | levelclear
let score=0, level=1, lives=3;
let paddle, balls, bricks, items, particles;

// ── 레벨별 아이돌 사진 (배경 블러 + 클리어 화면 공유) ────────────
let currentIdolPhoto = null;
const bgPhotoEl = document.getElementById('bgPhoto');

function setBgPhoto(url) {
  currentIdolPhoto = url;
  bgPhotoEl.classList.remove('loaded');
  if (url) {
    bgPhotoEl.onload  = () => bgPhotoEl.classList.add('loaded');
    bgPhotoEl.onerror = () => {};  // 실패 시 그냥 배경 없음
    bgPhotoEl.src = url;
  } else {
    bgPhotoEl.src = '';
  }
}

async function loadNewIdolPhoto() {
  setBgPhoto(null);                         // 이전 사진 지움
  const url = await fetchKpopImage();       // 그룹사진 없는 개인 Commons 사진
  setBgPhoto(url);
}

function initPaddle() {
  paddle = { w:110, h:14, x:(W-110)/2, y:H-46, speed:7 };
}

function spawnStartBall() {
  const spd = 4.4+(level-1)*0.55;
  const a   = -Math.PI/2+(Math.random()-.5)*.6;
  return { x:paddle.x+paddle.w/2, y:paddle.y-9, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, r:8, attached:true };
}

function freshBricks() {
  bricks=[];
  for (let r=0;r<ROWS;r++) {
    const pal=brickPalette(r);
    for (let c=0;c<COLS;c++)
      bricks.push({ x:PAD_X+BGAP+c*(BW+BGAP), y:PAD_TOP+BGAP+r*(BH+BGAP), w:BW, h:BH, pal, alive:true });
  }
}

function initLevel() {
  initPaddle();
  balls=[spawnStartBall()]; items=[]; particles=[];
  freshBricks(); refreshHUD();
  loadNewIdolPhoto();   // 새 레벨마다 새 아이돌 사진 로드 (배경 + 클리어용)
}

function resetBallOnly() {        // ← 실패해도 블럭 유지
  initPaddle();
  balls=[spawnStartBall()]; items=[]; particles=[];
  refreshHUD();
}

function refreshHUD() {
  scoreEl.textContent     = score;
  levelEl.textContent     = level;
  livesEl.textContent     = '❤'.repeat(lives)+'♡'.repeat(Math.max(0,3-lives));
  ballcountEl.textContent = balls ? balls.length : 1;
}

// ── 오버레이 ─────────────────────────────────────────────────────
function showOverlay(title, sub, color='#6af4ff') {
  overlay.innerHTML=`<h2 style="color:${color}">${title}</h2><p>${sub}</p>`;
  overlay.classList.remove('hidden');
}
function hideOverlay() { overlay.classList.add('hidden'); }

// ── K-pop 사진 표시 (비동기) ─────────────────────────────────────
let _dismissHandler = null;

function showKpopPhoto() {
  const imgEl   = document.getElementById('idolImg');
  const spinner = document.getElementById('photoSpinner');

  imgEl.classList.remove('loaded');
  imgEl.src = '';
  spinner.classList.remove('done');
  photoOverlay.classList.remove('hidden');

  // 새 fetch 없이 배경에 이미 로드된 사진 재사용 (그룹 사진 제외됨)
  const url = currentIdolPhoto;
  if (url) {
    imgEl.onload  = () => { spinner.classList.add('done'); imgEl.classList.add('loaded'); };
    imgEl.onerror = () => { spinner.classList.add('done'); };   // 실패 시 스피너만 숨김
    imgEl.src = url;
  } else {
    spinner.classList.add('done');   // 사진 없으면 스피너 바로 제거
  }

  // 키 입력 대기
  if (_dismissHandler) document.removeEventListener('keydown', _dismissHandler);
  setTimeout(() => {
    _dismissHandler = function dismiss(e) {
      if (state !== 'levelclear') return;
      e.preventDefault();
      document.removeEventListener('keydown', dismiss);
      _dismissHandler = null;
      photoOverlay.classList.add('hidden');
      initLevel();   // ← 여기서 loadNewIdolPhoto() 호출됨
      hideOverlay();
      state = 'playing';
    };
    document.addEventListener('keydown', _dismissHandler);
  }, 400);
}

// ── 치트: 레벨 스킵 ──────────────────────────────────────────────
function triggerLevelClear() {
  if (state !== 'playing') return;

  // 화면 플래시 텍스트
  const el = document.createElement('div');
  el.id = 'cheatFlash';
  el.textContent = '⚡ SKIP';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);

  level++;
  state = 'levelclear';
  refreshHUD();
  showKpopPhoto();
}

// ── 입력 ─────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();

  // 레벨 스킵 치트 (↑ ↓)
  if ((e.code==='ArrowUp' || e.code==='ArrowDown') && state==='playing') {
    triggerLevelClear(); return;
  }

  if (e.code==='Space') {
    if (state==='levelclear') return;
    if (state==='idle'||state==='over')  { newGame();          return; }
    if (state==='dead')                  { resumeAfterDeath(); return; }
    if (state==='playing') { state='paused'; showOverlay('⏸ PAUSED','SPACE 키로 재개','#6af4ff'); return; }
    if (state==='paused')  { state='playing'; hideOverlay(); return; }
  }
});
document.addEventListener('keyup', e => { keys[e.code]=false; });

function newGame() {
  score=0; level=1; lives=3;
  initLevel(); hideOverlay(); state='playing';
}
function resumeAfterDeath() {
  resetBallOnly(); hideOverlay(); state='playing';
}

// ── 아이템 ───────────────────────────────────────────────────────
const ITEM_DEFS = [
  { type:'MULTIBALL', icon:'+2', color:'#44ff90' },
  { type:'BIGBALL',   icon:'◉↑', color:'#ffd200' },
];

function trySpawnItem(bx, by) {
  if (Math.random()>=.04) return;
  const d=ITEM_DEFS[Math.floor(Math.random()*ITEM_DEFS.length)];
  items.push({ x:bx-22, y:by-10, w:44, h:20, vy:1.8, ...d });
}

function applyItem(it) {
  if (it.type==='MULTIBALL') {
    const ex=[];
    for (const b of balls) {
      if (b.attached) continue;
      for (let i=0;i<2;i++) {
        const a=Math.atan2(b.vy,b.vx)+(i===0?.45:-.45), spd=Math.hypot(b.vx,b.vy);
        ex.push({ x:b.x, y:b.y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, r:b.r, attached:false });
      }
    }
    balls.push(...ex.slice(0,Math.max(0,8-balls.length)));
  } else if (it.type==='BIGBALL') {
    for (const b of balls) b.r=Math.min(b.r+3,20);
  }
  spawnItemParticles(it.x+it.w/2, it.y+it.h/2, it.color);
  refreshHUD();
}

// ── 파티클 ───────────────────────────────────────────────────────
function spawnParticles(cx,cy,color,n=12) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=1.5+Math.random()*4;
    particles.push({ x:cx,y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s-1, r:1.5+Math.random()*2.5, life:1, color });
  }
}
function spawnItemParticles(cx,cy,color) {
  for (let i=0;i<20;i++) {
    const a=Math.random()*Math.PI*2, s=1+Math.random()*5;
    particles.push({ x:cx,y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2.5, r:2+Math.random()*3, life:1.4, color });
  }
}
function updateParticles(dt) {
  particles=particles.filter(p=>p.life>0);
  for (const p of particles) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=.09*dt; p.life-=.032*dt; }
}

// ── 업데이트 ─────────────────────────────────────────────────────
function update(dt) {
  // 패들
  if (keys['ArrowLeft'])  paddle.x=Math.max(0,paddle.x-paddle.speed*dt);
  if (keys['ArrowRight']) paddle.x=Math.min(W-paddle.w,paddle.x+paddle.speed*dt);

  // 부착 볼 → SPACE로만 발사 (↑↓ 는 치트로 사용)
  if (balls.every(b=>b.attached)) {
    const cx=paddle.x+paddle.w/2;
    for (const b of balls) { b.x=cx; b.y=paddle.y-b.r-1; }
    if (keys['Space']) for (const b of balls) b.attached=false;
  }

  for (const b of balls) {
    if (b.attached) continue;
    b.x+=b.vx*dt; b.y+=b.vy*dt;
    if (b.x-b.r<0)  { b.x=b.r;     b.vx= Math.abs(b.vx); }
    if (b.x+b.r>W)  { b.x=W-b.r;   b.vx=-Math.abs(b.vx); }
    if (b.y-b.r<0)  { b.y=b.r;     b.vy= Math.abs(b.vy); }

    const tolY=Math.abs(b.vy)*dt+2;
    if (b.vy>0 && b.x>paddle.x-b.r && b.x<paddle.x+paddle.w+b.r
        && b.y+b.r>=paddle.y && b.y+b.r<=paddle.y+paddle.h+tolY) {
      b.y=paddle.y-b.r;
      const rel=(b.x-(paddle.x+paddle.w/2))/(paddle.w/2);
      const a2=rel*(Math.PI/3), spd=Math.hypot(b.vx,b.vy);
      b.vx=Math.sin(a2)*spd; b.vy=-Math.abs(Math.cos(a2)*spd);
    }

    for (const br of bricks) {
      if (!br.alive) continue;
      const cx2=Math.max(br.x,Math.min(b.x,br.x+br.w));
      const cy2=Math.max(br.y,Math.min(b.y,br.y+br.h));
      const dx=b.x-cx2, dy=b.y-cy2;
      if (dx*dx+dy*dy<b.r*b.r) {
        br.alive=false; score+=10*level;
        spawnParticles(br.x+br.w/2,br.y+br.h/2,br.pal.main,14);
        trySpawnItem(br.x+br.w/2,br.y+br.h/2);
        if (b.r-Math.abs(dx)<b.r-Math.abs(dy)) b.vx=dx>0?Math.abs(b.vx):-Math.abs(b.vx);
        else                                    b.vy=dy>0?Math.abs(b.vy):-Math.abs(b.vy);
        break;
      }
    }
  }

  // 낙구 처리
  const prev=balls.length;
  balls=balls.filter(b=>b.y-b.r<H);
  if (balls.length!==prev) refreshHUD();

  if (balls.length===0) {
    lives--; refreshHUD();
    if (lives<=0) { state='over'; showOverlay('GAME OVER',`점수: ${score}\nSPACE 키로 재시작`,'#ff4d6d'); }
    else          { state='dead'; showOverlay('💥 MISS',`남은 목숨: ${lives}\nSPACE 키로 재개 (블럭 유지)`,'#ff9f1c'); }
    return;
  }

  // 레벨 클리어
  if (bricks.every(b=>!b.alive)) {
    level++; state='levelclear'; refreshHUD();
    showKpopPhoto(); return;
  }

  // 아이템
  items=items.filter(it=>it.y<H+40);
  for (const it of items) {
    it.y+=it.vy*dt;
    if (it.y+it.h>=paddle.y && it.y<=paddle.y+paddle.h+it.vy*dt+2
        && it.x+it.w>=paddle.x && it.x<=paddle.x+paddle.w) {
      applyItem(it); it.y=H+200;
    }
  }
  scoreEl.textContent=score;
  updateParticles(dt);
}

// ── 배경 (캐시) ──────────────────────────────────────────────────
let bgCache=null;
function buildBG() {
  const off=document.createElement('canvas');
  off.width=W; off.height=H;
  const oc=off.getContext('2d');
  oc.clearRect(0,0,W,H);   // 투명 시작 → 반투명 레이어 합성 가능

  // 반투명 그라디언트 → 블러 배경사진이 캔버스를 통해 비쳐 보임
  const gb=oc.createLinearGradient(0,0,0,H);
  gb.addColorStop(0,'rgba(21,10,44,0.18)');
  gb.addColorStop(.5,'rgba(12,12,32,0.22)');
  gb.addColorStop(1,'rgba(7,7,16,0.30)');
  oc.fillStyle=gb; oc.fillRect(0,0,W,H);

  const ceilBot=PAD_TOP+ROWS*(BH+BGAP)+BGAP+12;
  oc.strokeStyle='rgba(90,70,200,.05)'; oc.lineWidth=1;
  for (let x=0;x<=W;x+=40) { oc.beginPath(); oc.moveTo(x,0); oc.lineTo(x,ceilBot); oc.stroke(); }
  for (let y=0;y<=ceilBot;y+=30) { oc.beginPath(); oc.moveTo(0,y); oc.lineTo(W,y); oc.stroke(); }

  const vx=W/2, vy=ceilBot;
  for (let x=0;x<=W;x+=40) {
    oc.strokeStyle='rgba(70,50,180,.06)';
    oc.beginPath(); oc.moveTo(vx+(x-vx)*.05,vy); oc.lineTo(x,H); oc.stroke();
  }
  for (let y=vy;y<=H;y+=28) {
    const t=(y-vy)/(H-vy);
    oc.strokeStyle=`rgba(70,50,180,${.025+t*.06})`;
    oc.beginPath(); oc.moveTo(0,y); oc.lineTo(W,y); oc.stroke();
  }

  const vg=oc.createRadialGradient(W/2,H/2,H*.1,W/2,H/2,H*.85);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.15)');
  oc.fillStyle=vg; oc.fillRect(0,0,W,H);

  const ag=oc.createRadialGradient(W/2,PAD_TOP+30,0,W/2,PAD_TOP+30,W*.7);
  ag.addColorStop(0,'rgba(140,80,255,.06)'); ag.addColorStop(1,'rgba(0,0,0,0)');
  oc.fillStyle=ag; oc.fillRect(0,0,W,H);
  return off;
}

// ── 그리기 ───────────────────────────────────────────────────────
function drawBrick(b) {
  const {x,y,w,h,pal}=b; const bv=5;
  ctx.shadowColor='rgba(0,0,0,.55)'; ctx.shadowBlur=8; ctx.shadowOffsetX=3; ctx.shadowOffsetY=4;
  const g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,pal.top); g.addColorStop(.45,pal.main); g.addColorStop(1,pal.side);
  ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
  ctx.shadowColor='transparent'; ctx.shadowBlur=ctx.shadowOffsetX=ctx.shadowOffsetY=0;
  ctx.fillStyle='rgba(255,255,255,.58)'; ctx.fillRect(x,y,w,bv);
  ctx.fillStyle='rgba(255,255,255,.26)'; ctx.fillRect(x,y+bv,bv,h-bv);
  ctx.fillStyle='rgba(0,0,0,.40)';       ctx.fillRect(x,y+h-bv,w,bv);
  ctx.fillStyle='rgba(0,0,0,.28)';       ctx.fillRect(x+w-bv,y+bv,bv,h-bv*2);
  const sl=ctx.createLinearGradient(x+10,0,x+w-10,0);
  sl.addColorStop(0,'rgba(255,255,255,0)'); sl.addColorStop(.5,'rgba(255,255,255,.18)'); sl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sl; ctx.fillRect(x+10,y+7,w-20,4);
  ctx.shadowColor=pal.glow; ctx.shadowBlur=5;
  ctx.strokeStyle=pal.top+'66'; ctx.lineWidth=1;
  ctx.strokeRect(x+.5,y+.5,w-1,h-1); ctx.shadowBlur=0;
}

function drawPaddle() {
  const {x,y,w,h}=paddle; const dp=5,r=6;
  ctx.fillStyle='#082840';
  ctx.beginPath(); ctx.roundRect(x+dp,y+h,w-dp,dp,[0,0,r,r]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(x+w,y+dp,dp,h-dp,[0,r,r,0]); ctx.fill();
  const g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,'#ddf4ff'); g.addColorStop(.12,'#88d8f8'); g.addColorStop(.55,'#2288cc'); g.addColorStop(1,'#0d5888');
  ctx.shadowColor='#5ad8ff88'; ctx.shadowBlur=16;
  ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,.72)';
  ctx.beginPath(); ctx.roundRect(x+10,y+2,w-20,3,2); ctx.fill();
}

function drawOneBall(b) {
  const hx=b.x-b.r*.3, hy=b.y-b.r*.3;
  ctx.shadowColor='rgba(100,210,255,.75)'; ctx.shadowBlur=b.r*2.2;
  const g=ctx.createRadialGradient(hx,hy,b.r*.04,b.x,b.y,b.r);
  g.addColorStop(0,'#ffffff'); g.addColorStop(.22,'#c2eeff'); g.addColorStop(.6,'#3abcf0'); g.addColorStop(1,'#0b4f75');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,.82)';
  ctx.beginPath(); ctx.ellipse(hx,hy,b.r*.26,b.r*.18,-Math.PI/5,0,Math.PI*2); ctx.fill();
}

function drawItem(it) {
  ctx.shadowColor=it.color; ctx.shadowBlur=14;
  ctx.fillStyle='rgba(4,4,18,.82)';
  ctx.beginPath(); ctx.roundRect(it.x,it.y,it.w,it.h,it.h/2); ctx.fill();
  ctx.strokeStyle=it.color; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.roundRect(it.x,it.y,it.w,it.h,it.h/2); ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle=it.color; ctx.font="bold 11px 'Courier New'";
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(it.icon,it.x+it.w/2,it.y+it.h/2);
}

function drawParticles() {
  ctx.shadowBlur=4;
  for (const p of particles) {
    if (p.life<=0) continue;
    ctx.globalAlpha=Math.max(0,Math.min(1,p.life));
    ctx.shadowColor=p.color; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

// ── 메인 루프 ─────────────────────────────────────────────────────
let last=0;
function loop(ts) {
  const dt=Math.min((ts-last)/16.67,3); last=ts;
  if (!bgCache) bgCache=buildBG();
  ctx.clearRect(0,0,W,H);        // 프레임마다 캔버스 초기화 → 배경사진이 비침
  ctx.drawImage(bgCache,0,0);
  ctx.strokeStyle='rgba(255,255,255,.04)'; ctx.lineWidth=1;
  ctx.strokeRect(.5,.5,W-1,H-1);
  drawParticles();
  for (const b of bricks) if (b.alive) drawBrick(b);
  for (const it of items) drawItem(it);
  drawPaddle();
  for (const b of balls) drawOneBall(b);
  if (state==='playing') update(dt);
  requestAnimationFrame(loop);
}

// ── 시작 ─────────────────────────────────────────────────────────
initLevel();
state='idle';
requestAnimationFrame(loop);
</script>
