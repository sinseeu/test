<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BREAKOUT 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #030308;   /* 사진 없을 때 폴백 다크 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Orbitron', 'Courier New', monospace;
      color: #fff;
      user-select: none;
    }

    /* ── 블러 배경사진 (게임 내내 깔림) — img 태그로 ORB 우회 ── */
    #bgPhoto {
      position: fixed;
      inset: -8%;                   /* 엣지 번짐 숨기기 */
      width: 116%; height: 116%;   /* inset -8% 보정 */
      z-index: 0;
      object-fit: contain;
      filter: blur(6px) brightness(0.85) saturate(0.85);
      opacity: 0;
      transition: opacity 1.4s ease;
      pointer-events: none;
      display: block;
    }
    #bgPhoto.loaded { opacity: 0.6; }

    /* 게임 UI 요소는 bgPhoto 위에 */
    h1, #hud, #wrap, #tip { position:relative; z-index:1; }

    h1 {
      font-size: 2rem;
      letter-spacing: 10px;
      margin-bottom: 14px;
      background: linear-gradient(90deg, #6af4ff, #a78bfa, #6af4ff);
      background-size: 200%;
      animation: shimmer 3s linear infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px #6af4ff44);
    }
    @keyframes shimmer { from{background-position:0%} to{background-position:200%} }

    #hud { display:flex; gap:28px; margin-bottom:8px; flex-wrap:wrap; justify-content:center; }
    .hud-item { text-align:center; min-width:54px; }
    .hud-item .lbl { display:block; font-size:.55rem; color:#555; letter-spacing:2px; margin-bottom:2px; }
    .hud-item .val { font-size:.95rem; color:#ddd; font-weight:bold; }
    #hiscore-val { color:#f7e733; }
    /* 콤보 HUD */
    #combo-hud {
      display:none; align-items:center; gap:6px;
      margin-bottom:6px; position:relative; z-index:1;
    }
    #combo-hud .combo-txt {
      font-size:.75rem; letter-spacing:3px;
      background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
      filter:drop-shadow(0 0 6px #ffd93d88);
    }
    @keyframes comboPop { 0%{transform:scale(1)} 40%{transform:scale(1.35)} 100%{transform:scale(1)} }
    .combo-pop { animation:comboPop .22s ease; }
    /* 아이템 지속 효과 상태바 */
    #status-bar {
      display:none; gap:8px; margin-bottom:6px; flex-wrap:wrap; justify-content:center;
      position:relative; z-index:1;
    }
    .stat {
      font-size:.62rem; letter-spacing:2px; padding:2px 12px; border-radius:20px;
      border:1.2px solid currentColor;
      animation:statGlow 1.6s ease-in-out infinite alternate;
    }
    .stat.pierce { color:#ffd200; background:rgba(255,210,0,.12); }
    .stat.wide   { color:#c084fc; background:rgba(192,132,252,.12); }
    @keyframes statGlow { from{opacity:.7;filter:brightness(.9)} to{opacity:1;filter:brightness(1.45)} }
    /* 모바일 버튼 */
    #mobileCtrl {
      display:none; gap:14px; margin-top:14px;
      justify-content:center; align-items:center;
      position:relative; z-index:1;
    }
    @media (hover:none) and (pointer:coarse) { #mobileCtrl { display:flex; } }
    .ctrl-btn {
      width:76px; height:56px; border-radius:14px;
      background:rgba(255,255,255,.07); border:1.5px solid rgba(255,255,255,.18);
      color:#ccc; font-size:1.2rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      user-select:none; -webkit-tap-highlight-color:transparent;
      transition:background .1s;
    }
    .ctrl-btn:active { background:rgba(255,255,255,.18); }
    #btnFire { width:96px; background:rgba(90,210,255,.1); border-color:rgba(90,210,255,.35); color:#6af4ff; font-size:.75rem; letter-spacing:2px; }

    canvas { display:block; border:2px solid rgba(255,255,255,0.65); border-radius:2px; box-shadow:0 0 0 4px rgba(255,255,255,0.08), 0 0 80px #000a; max-width:100vw; touch-action:none; }
    @media (max-width: 720px) {
      #wrap { width: 100vw; }
      canvas { width: 100vw !important; height: auto !important; }
      h1 { font-size: 1.3rem; letter-spacing: 5px; }
      #hud { gap: 16px; }
      #tip { font-size: .58rem; padding: 0 8px; text-align: center; }
    }
    #wrap { position:relative; z-index:1; }

    /* ── 게임 오버레이 ── */
    #overlay {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      text-align:center; padding:22px 40px;
      background:rgba(4,4,16,.88); border:1px solid #ffffff14;
      border-radius:10px; backdrop-filter:blur(6px);
      pointer-events:none; min-width:240px;
    }
    #overlay.hidden { display:none; }
    #overlay h2 { font-size:1.7rem; letter-spacing:4px; margin-bottom:10px; text-shadow:0 0 18px currentColor; }
    #overlay p  { font-size:.8rem; color:#666; letter-spacing:2px; line-height:1.8; }

    /* ── K-pop 사진 오버레이 (전체화면) ── */
    #photoOverlay {
      position:fixed; inset:0; z-index:999;
      background:#000;
      animation:fadeIn .5s ease;
    }
    #photoOverlay.hidden { display:none; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    /* 로딩 스피너 */
    #photoSpinner {
      position:absolute; inset:0; z-index:3;
      display:flex; align-items:center; justify-content:center;
      background:#0a0a14;
      transition:opacity .35s;
    }
    #photoSpinner.done { opacity:0; pointer-events:none; }

    .spin-ring {
      width:52px; height:52px;
      border:3px solid #1e1e2e;
      border-top-color:#c084fc;
      border-radius:50%;
      animation:spin .75s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* 전체화면 사진 — contain으로 원본 비율 유지, 크롭 없음 */
    #idolImg {
      position:absolute; inset:0; z-index:1;
      width:100%; height:100%;
      object-fit:contain;
      opacity:0; transition:opacity .55s ease;
    }
    #idolImg.loaded { opacity:1; }

    /* 상단 그라디언트 오버레이 */
    .photo-top {
      position:absolute; top:0; left:0; right:0; z-index:4;
      padding:28px 0 70px;
      background:linear-gradient(to bottom, rgba(0,0,0,.72) 0%, transparent 100%);
      display:flex; justify-content:center;
    }
    .clear-badge {
      font-size:1rem; letter-spacing:9px; color:#f7e733;
      text-shadow:0 0 22px #f7e733cc, 0 2px 8px rgba(0,0,0,.8);
      animation:pulse 1.1s ease-in-out infinite alternate;
    }
    @keyframes pulse { from{opacity:.75} to{opacity:1} }

    /* 하단 그라디언트 오버레이 */
    .photo-bottom {
      position:absolute; bottom:0; left:0; right:0; z-index:4;
      padding:70px 0 30px;
      background:linear-gradient(to top, rgba(0,0,0,.72) 0%, transparent 100%);
      display:flex; justify-content:center; align-items:flex-end;
    }
    .press-hint {
      font-size:.72rem; color:rgba(255,255,255,.55);
      letter-spacing:4px;
      animation:blink 1.2s step-end infinite;
    }
    @keyframes blink { 50%{opacity:0} }

    /* 치트 알림 */
    #cheatFlash {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:1.4rem; letter-spacing:6px; color:#f7e733;
      text-shadow:0 0 24px #f7e733;
      pointer-events:none; z-index:998;
      animation:cheatAnim .7s ease forwards;
    }
    @keyframes cheatAnim {
      0%  { opacity:1; transform:translate(-50%,-50%) scale(1); }
      100%{ opacity:0; transform:translate(-50%,-70%) scale(1.3); }
    }

    #tip { margin-top:12px; font-size:.7rem; color:#333; letter-spacing:1px; }
  </style>
</head>
<body>

<!-- 블러 배경사진 (img 태그 — CSS background보다 CORS 제약 없음) -->
<img id="bgPhoto" src="" alt="">

<h1>BREAKOUT 3D</h1>
<div id="hud">
  <div class="hud-item"><span class="lbl">SCORE</span><span class="val" id="score">0</span></div>
  <div class="hud-item"><span class="lbl">BEST</span><span class="val" id="hiscore-val">0</span></div>
  <div class="hud-item"><span class="lbl">LEVEL</span><span class="val" id="level">1</span></div>
  <div class="hud-item"><span class="lbl">LIVES</span><span class="val" id="lives">❤❤❤</span></div>
  <div class="hud-item"><span class="lbl">BALLS</span><span class="val" id="ballcount">1</span></div>
</div>
<div id="combo-hud"><span class="combo-txt" id="combo-txt">COMBO ×1</span></div>
<div id="status-bar"></div>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="overlay"><h2 style="color:#6af4ff">BREAKOUT 3D</h2><p>SPACE 키로 시작</p></div>
</div>

<!-- K-pop 사진 오버레이 (전체화면) -->
<div id="photoOverlay" class="hidden">
  <div id="photoSpinner"><div class="spin-ring"></div></div>
  <img id="idolImg" src="" alt="">
  <div class="photo-top"><span class="clear-badge">✦ LEVEL CLEAR ✦</span></div>
  <div class="photo-bottom"><span class="press-hint">— 아무 키나 누르면 다음 레벨 —</span></div>
</div>

<div id="tip">PC: ← → 이동 · SPACE 발사 · ↑ 레벨스킵 · ↓ 이전 클리어 보기 &nbsp;|&nbsp; Mobile: 드래그 · 탭 발사 · 스와이프↑ 스킵 · ↓ 이전 클리어</div>
<div id="mobileCtrl">
  <button class="ctrl-btn" id="btnLeft">◀</button>
  <button class="ctrl-btn" id="btnFire">● FIRE</button>
  <button class="ctrl-btn" id="btnRight">▶</button>
</div>

<script>
// ── Canvas ──────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const COLS=5, ROWS=2, BW=120, BH=38, BGAP=8, PAD_X=20, PAD_TOP=54;
canvas.width  = COLS*(BW+BGAP)+BGAP+PAD_X*2;
canvas.height = 560;
const W=canvas.width, H=canvas.height;

// ── HUD ─────────────────────────────────────────────────────────
const scoreEl     = document.getElementById('score');
const levelEl     = document.getElementById('level');
const livesEl     = document.getElementById('lives');
const ballcountEl = document.getElementById('ballcount');
const overlay     = document.getElementById('overlay');
const photoOverlay = document.getElementById('photoOverlay');
const hiScoreEl   = document.getElementById('hiscore-val');
const comboHud    = document.getElementById('combo-hud');
const comboTxtEl  = document.getElementById('combo-txt');

// ── 사운드 (Web Audio API 합성음) ────────────────────────────────
let _ac=null;
function _getAC(){
  if(!_ac) _ac=new(window.AudioContext||window.webkitAudioContext)();
  if(_ac.state==='suspended') _ac.resume();
  return _ac;
}
function _tone(freq,type,dur,vol=0.22){
  try{
    const ac=_getAC(),osc=ac.createOscillator(),g=ac.createGain();
    osc.connect(g);g.connect(ac.destination);
    osc.type=type;osc.frequency.value=freq;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    osc.start();osc.stop(ac.currentTime+dur);
  }catch(e){}
}
function sfx(n){
  switch(n){
    case 'brick':  _tone(520,'square',.07,.18); break;
    case 'paddle': _tone(230,'sine',.09,.20); break;
    case 'wall':   _tone(340,'sine',.05,.12); break;
    case 'item':   _tone(880,'sine',.15,.25); setTimeout(()=>_tone(1100,'sine',.15,.18),80); break;
    case 'death':  [180,140,105].forEach((f,i)=>setTimeout(()=>_tone(f,'sawtooth',.3,.32),i*170)); break;
    case 'clear':  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>_tone(f,'sine',.2,.28),i*85)); break;
    case 'over':   [300,240,180,120].forEach((f,i)=>setTimeout(()=>_tone(f,'sawtooth',.32,.32),i*155)); break;
  }
}
// 첫 인터랙션에서 AudioContext 활성화
document.addEventListener('keydown', ()=>_getAC(), {once:true});
document.addEventListener('touchstart', ()=>_getAC(), {once:true});

// ── 하이스코어 ───────────────────────────────────────────────────
const HI_KEY='bk3d_hi';
let hiScore=parseInt(localStorage.getItem(HI_KEY)||'0');
function updateHiScore(){
  if(score>hiScore){hiScore=score;localStorage.setItem(HI_KEY,String(hiScore));}
  hiScoreEl.textContent=hiScore;
}

// ── 콤보 ─────────────────────────────────────────────────────────
let combo=0;
function addCombo(){
  combo++;
  const mult=Math.ceil(combo/3);
  if(combo>1){
    comboHud.style.display='flex';
    comboTxtEl.textContent=`COMBO ×${mult}`;
    comboTxtEl.classList.remove('combo-pop');
    void comboTxtEl.offsetWidth;
    comboTxtEl.classList.add('combo-pop');
  }
}
function resetCombo(){ combo=0; comboHud.style.display='none'; }

// ── 화면 흔들림 ──────────────────────────────────────────────────
let shake=0;

// ── 볼 트레일 버퍼 ──────────────────────────────────────────────
const TRAIL=6;

// ── 기기 해상도 기반 이미지 품질 하한선 ─────────────────────────
// 파일 용량 아닌 현재 기기의 물리 픽셀 기준 — 저해상도 사진 완전 제외
const _dpr        = Math.min(window.devicePixelRatio || 1, 3);
const _screenLong = Math.max(screen.width  || 1080, screen.height || 1920);
const _screenShrt = Math.min(screen.width  || 1080, screen.height || 1920);
// 장축 40% 이상 해상도 필요 (1x 데스크탑 ≈800px, 3x 폰 ≈1020px)
const MIN_IMG_LONG = Math.round(_screenLong * _dpr * 0.40);
const MIN_IMG_SHRT = Math.round(_screenShrt * _dpr * 0.30);
// 썸네일 요청 크기: 기기 너비 × DPR (상한 2000)
const IMG_THUMB_W  = String(Math.min(2000, Math.max(1200, Math.round(screen.width * _dpr))));

// ── K-pop 개인 아이돌 — Wikimedia Commons 검색어 ─────────────────
// Commons는 로고/서명이 아닌 실제 인물 사진이 많음
const KPOP_IDOLS = [
  'Jisoo BLACKPINK singer',
  'Jennie Kim BLACKPINK',
  'Rosé BLACKPINK singer',
  'Lisa BLACKPINK singer',
  'Nayeon TWICE singer',
  'Jihyo TWICE singer',
  'Tzuyu TWICE singer',
  'Sana TWICE singer',
  'Momo TWICE singer',
  'Karina aespa singer',
  'Winter aespa singer',
  'Jang Wonyoung IVE singer',
  'An Yujin IVE singer',
  'Minji NewJeans singer',
  'Hanni NewJeans singer',
  'Irene Red Velvet singer',
  'Seulgi Red Velvet singer',
  'Wendy Red Velvet singer',
  'Joy Red Velvet singer',
  'Soyeon G-IDLE rapper',
  'Ryujin ITZY singer',
  'Yeji ITZY singer',
  'Sakura Kpop singer',
  'Kim Chaewon Kpop singer',
];

// 그룹 사진 폴백 제거 — 개인 클로즈업 사진 없으면 배경 없음(null)

function fetchTimeout(url, ms=6000) {
  const ctrl = new AbortController();
  const id   = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(id));
}

// 비포토 패턴 (로고·서명·앨범커버·무대·MV 등 제외)
const NON_PHOTO = /logo|signature|album|cover|stamp|flag|map|icon|poster|concert|stage|tour|mv|music.video|choreograph|handwriting|pictogram|symbol|coa|seal|\.svg/i;

async function tryFetchOneIdol(q) {
  const sr = await fetchTimeout(
    'https://commons.wikimedia.org/w/api.php?' + new URLSearchParams({
      action:'query', list:'search',
      srsearch: q, srnamespace:'6', srlimit:'24',
      format:'json', origin:'*',
    }), 8000
  );
  if (!sr.ok) return null;
  const sd = await sr.json();

  const files = (sd.query?.search || [])
    .filter(f => /\.(jpg|jpeg|png)$/i.test(f.title) && !NON_PHOTO.test(f.title));
  if (!files.length) return null;

  const titles = files.slice(0, 14).map(f => f.title).join('|');
  const ir = await fetchTimeout(
    'https://commons.wikimedia.org/w/api.php?' + new URLSearchParams({
      action:'query', titles,
      prop:'imageinfo', iiprop:'url|dimensions',
      iiurlwidth: IMG_THUMB_W,   // 기기 DPR 기반 동적 요청 크기
      format:'json', origin:'*',
    }), 8000
  );
  if (!ir.ok) return null;

  const id2 = await ir.json();

  // ── 포트레이트 점수: 상반신·전신(1.5~2.2)을 최우선 ──────────────
  // 1.2~1.35 = 홍보용 증명사진 비율 → 클로즈업 많음 → 낮게 평가
  function portraitScore(info) {
    const r = (info?.height || 0) / (info?.width || 1);
    if (r < 0.75) return 0;       // 가로사진 — 제외
    if (r < 1.15) return 0.2;     // 거의 정사각 — 극단 클로즈업
    if (r < 1.35) return 0.35;    // 표준 증명사진(홍보컷) — 클로즈업 많음
    if (r < 1.55) return 0.65;    // 표준 상반신
    if (r <= 2.2) return 1.0;     // ✅ 최우선: 상반신~전신
    if (r <= 2.7) return 0.7;     // 길쭉한 전신
    return 0.1;                    // 극단적으로 좁고 긺 — 거의 제외
  }

  const pages = Object.values(id2.query.pages)
    .sort((a, b) => portraitScore(b.imageinfo?.[0]) - portraitScore(a.imageinfo?.[0]));

  for (const page of pages) {
    const info = page.imageinfo?.[0];
    if (!info?.thumburl) continue;
    const longSide  = Math.max(info.width, info.height);
    const shortSide = Math.min(info.width, info.height);
    const r = info.height / (info.width || 1);
    // 기기 물리 픽셀 기준 저해상도 완전 제외
    if (longSide  < MIN_IMG_LONG) continue;
    if (shortSide < MIN_IMG_SHRT) continue;
    if (r > 2.8) continue;        // 극단 클로즈업 제외
    return info.thumburl;
  }
  return null;
}

// ── 사진 중복 방지 + 사전 로딩 ──────────────────────────────────────
let _usedPhotoUrls = new Set();   // 이미 쓴 사진 URL 추적
let _nextPhoto     = null;        // 미리 로딩해둔 다음 사진 URL
let _nextLoading   = false;       // 프리로드 진행 중 여부

async function fetchKpopImage() {
  // 최대 6번 다른 아이돌로 시도하며 이미 쓴 사진은 건너뜀
  const tried = new Set();
  const maxTry = Math.min(6, KPOP_IDOLS.length);
  for (let attempt = 0; attempt < maxTry; attempt++) {
    let idx;
    do { idx = Math.floor(Math.random() * KPOP_IDOLS.length); } while (tried.has(idx));
    tried.add(idx);
    try {
      const url = await tryFetchOneIdol(KPOP_IDOLS[idx]);
      if (url && !_usedPhotoUrls.has(url)) {
        _usedPhotoUrls.add(url);
        return url;
      }
    } catch(e) {
      console.warn('Commons fetch attempt', attempt+1, 'failed:', e);
    }
  }
  // 모든 URL이 소진됐거나 시도 실패 → 중복 허용하고 재시도
  if (_usedPhotoUrls.size > 0) {
    console.log('All photos used — resetting dedup pool');
    _usedPhotoUrls.clear();
    return fetchKpopImage();
  }
  return null;
}

// 다음 레벨 사진을 백그라운드에서 미리 가져옴
async function _preloadNext() {
  if (_nextLoading || _nextPhoto) return;
  _nextLoading = true;
  try {
    const url = await fetchKpopImage();
    _nextPhoto = url;
  } catch(e) {
    console.warn('Preload next photo failed:', e);
  } finally {
    _nextLoading = false;
  }
}

// ── 팔레트 ──────────────────────────────────────────────────────
const ROW_HUE = [355, 205];
function brickPalette(row) {
  const h=ROW_HUE[row], s=88;
  return { top:`hsl(${h},${s}%,72%)`, main:`hsl(${h},${s}%,52%)`, side:`hsl(${h},${s}%,32%)`, glow:`hsl(${h},${s}%,52%)` };
}

// ── 게임 상태 ────────────────────────────────────────────────────
let state = 'idle'; // idle | playing | paused | dead | over | levelclear | photoreplay
let score=0, level=1, lives=3;
let paddle, balls, bricks, items, particles;
let levelClearPhotos = {}; // { [lvl]: url } — 레벨별 클리어 사진 저장
let replayLvl = 0;         // 현재 리플레이 중인 레벨 번호

// ── 지속 효과 (레벨 이어짐, 라이프 잃으면 초기화) ────────────────
const PERSIST_DEFAULT = { ballR:8, paddleW:110, pierce:0 };
let persist = { ...PERSIST_DEFAULT };

// ── 레벨별 아이돌 사진 (배경 블러 + 클리어 화면 공유) ────────────
let currentIdolPhoto = null;
const bgPhotoEl = document.getElementById('bgPhoto');

function setBgPhoto(url) {
  currentIdolPhoto = url;
  bgPhotoEl.classList.remove('loaded');
  if (url) {
    bgPhotoEl.onload  = () => bgPhotoEl.classList.add('loaded');
    bgPhotoEl.onerror = () => {};  // 실패 시 그냥 배경 없음
    bgPhotoEl.src = url;
  } else {
    bgPhotoEl.src = '';
  }
}

async function loadNewIdolPhoto() {
  setBgPhoto(null);                         // 이전 사진 지움
  let url;
  if (_nextPhoto) {
    // 미리 로딩된 사진 즉시 사용
    url = _nextPhoto;
    _nextPhoto = null;
  } else {
    url = await fetchKpopImage();
  }
  setBgPhoto(url);
  // 다음 레벨을 위해 백그라운드에서 미리 로딩
  _preloadNext();
}

function initPaddle() {
  const pw = persist.paddleW;
  paddle = { w:pw, h:14, x:(W-pw)/2, y:H-46, speed:7 };
}

function spawnStartBall() {
  const spd = 4.4+(level-1)*0.55;
  const a   = -Math.PI/2+(Math.random()-.5)*.6;
  return { x:paddle.x+paddle.w/2, y:paddle.y-9, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
           r:persist.ballR, attached:true, trail:[], pierce:persist.pierce };
}

function freshBricks() {
  bricks=[];
  for (let r=0;r<ROWS;r++) {
    const pal=brickPalette(r);
    for (let c=0;c<COLS;c++)
      bricks.push({ x:PAD_X+BGAP+c*(BW+BGAP), y:PAD_TOP+BGAP+r*(BH+BGAP), w:BW, h:BH, pal, alive:true });
  }
}

function initLevel() {
  initPaddle();  // persist.paddleW 반영
  balls=[spawnStartBall()]; items=[]; particles=[];
  freshBricks(); refreshHUD(); refreshStatus();
  loadNewIdolPhoto();
}

function resetBallOnly() {        // 라이프 감소 → 모든 효과 초기화
  const hadEffects = persist.pierce > 0 || persist.paddleW > PERSIST_DEFAULT.paddleW;
  persist = { ...PERSIST_DEFAULT };
  initPaddle();
  balls=[spawnStartBall()]; items=[]; particles=[];
  if (hadEffects) flashEffect('✗ EFFECTS LOST', '#ff6b6b');
  refreshHUD(); refreshStatus();
}

function refreshHUD() {
  scoreEl.textContent     = score;
  levelEl.textContent     = level;
  livesEl.textContent     = '❤'.repeat(lives)+'♡'.repeat(Math.max(0,3-lives));
  ballcountEl.textContent = balls ? balls.length : 1;
}

function refreshStatus() {
  const bar = document.getElementById('status-bar');
  if (!bar) return;
  let html = '';
  if (persist.pierce > 0)
    html += `<span class="stat pierce">⇒⇒ ×${persist.pierce}</span>`;
  if (persist.paddleW > PERSIST_DEFAULT.paddleW)
    html += `<span class="stat wide">⟷+ WIDE</span>`;
  bar.innerHTML = html;
  bar.style.display = html ? 'flex' : 'none';
}

function flashEffect(msg, color='#ff4d6d') {
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);`+
    `font-size:1.05rem;letter-spacing:4px;color:${color};`+
    `text-shadow:0 0 20px ${color};pointer-events:none;z-index:998;`+
    `animation:cheatAnim .9s ease forwards;font-family:'Orbitron',monospace;`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

// ── 오버레이 ─────────────────────────────────────────────────────
function showOverlay(title, sub, color='#6af4ff') {
  overlay.innerHTML=`<h2 style="color:${color}">${title}</h2><p>${sub}</p>`;
  overlay.classList.remove('hidden');
}
function hideOverlay() { overlay.classList.add('hidden'); }

// ── K-pop 사진 표시 (비동기) ─────────────────────────────────────
let _dismissHandler = null;

function showKpopPhoto() {
  // 뱃지 텍스트 레벨클리어 기본값으로 복원 (replay 후에도 올바르게 표시)
  document.querySelector('.clear-badge').textContent  = '✦ LEVEL CLEAR ✦';
  document.querySelector('.press-hint').textContent   = '— 아무 키나 누르면 다음 레벨 —';

  const imgEl   = document.getElementById('idolImg');
  const spinner = document.getElementById('photoSpinner');

  imgEl.classList.remove('loaded');
  imgEl.src = '';
  spinner.classList.remove('done');
  photoOverlay.classList.remove('hidden');

  // 새 fetch 없이 배경에 이미 로드된 사진 재사용 (그룹 사진 제외됨)
  const url = currentIdolPhoto;
  if (url) {
    imgEl.onload  = () => { spinner.classList.add('done'); imgEl.classList.add('loaded'); };
    imgEl.onerror = () => { spinner.classList.add('done'); };   // 실패 시 스피너만 숨김
    imgEl.src = url;
  } else {
    spinner.classList.add('done');   // 사진 없으면 스피너 바로 제거
  }

  // 키 입력 대기 (levelclear 상태 전용)
  if (_dismissHandler) document.removeEventListener('keydown', _dismissHandler);
  setTimeout(() => {
    _dismissHandler = function dismiss(e) {
      if (state !== 'levelclear') return;
      e.preventDefault();
      document.removeEventListener('keydown', dismiss);
      _dismissHandler = null;
      photoOverlay.classList.add('hidden');
      initLevel();
      hideOverlay();
      state = 'playing';
    };
    document.addEventListener('keydown', _dismissHandler);
  }, 400);
}

// ── ↓키: 지정 레벨의 클리어 사진 표시 ───────────────────────────
function showPhotoReplay(lvl) {
  const url = levelClearPhotos[lvl] || null;
  replayLvl = lvl;
  state = 'photoreplay';

  const imgEl   = document.getElementById('idolImg');
  const spinner = document.getElementById('photoSpinner');
  imgEl.classList.remove('loaded'); imgEl.src = '';
  spinner.classList.remove('done');
  photoOverlay.classList.remove('hidden');

  document.querySelector('.clear-badge').textContent = `✦ LEVEL ${lvl} CLEAR ✦`;
  document.querySelector('.press-hint').textContent  = '↓ 이전 레벨로 · 다른 키 = 현재 레벨로 복귀';

  if (url) {
    imgEl.onload  = () => { spinner.classList.add('done'); imgEl.classList.add('loaded'); };
    imgEl.onerror = () => { spinner.classList.add('done'); };
    imgEl.src = url;
  } else {
    spinner.classList.add('done');
  }

  if (_dismissHandler) document.removeEventListener('keydown', _dismissHandler);
  setTimeout(() => {
    _dismissHandler = function dismiss(e) {
      if (state !== 'photoreplay') return;
      // ↓키는 메인 핸들러가 먼저 처리 → 여기 도달 시 state가 이미 변경됨
      e.preventDefault();
      document.removeEventListener('keydown', dismiss);
      _dismissHandler = null;
      _closePhotoReplay(); // ↓ 외 다른 키 → 현재 레벨로 복귀
    };
    document.addEventListener('keydown', _dismissHandler);
  }, 300);
}

// 현재 레벨로 복귀 (사진만 닫기)
function _closePhotoReplay() {
  photoOverlay.classList.add('hidden');
  document.querySelector('.clear-badge').textContent = '✦ LEVEL CLEAR ✦';
  document.querySelector('.press-hint').textContent  = '— 아무 키나 누르면 다음 레벨 —';
  state = 'playing';
}

// ↓ × 2: 실제로 그 레벨로 이동해 플레이
function goBackToLevel(n) {
  photoOverlay.classList.add('hidden');
  document.querySelector('.clear-badge').textContent = '✦ LEVEL CLEAR ✦';
  document.querySelector('.press-hint').textContent  = '— 아무 키나 누르면 다음 레벨 —';
  // _dismissHandler 해제
  if (_dismissHandler) { document.removeEventListener('keydown', _dismissHandler); _dismissHandler = null; }

  level = n;
  persist = { ...PERSIST_DEFAULT };
  // 해당 레벨 클리어 당시 사진을 배경으로 복원
  const bgUrl = levelClearPhotos[n] || null;
  setBgPhoto(bgUrl);
  currentIdolPhoto = bgUrl;

  initPaddle();
  balls = [spawnStartBall()]; items = []; particles = [];
  freshBricks();
  refreshHUD(); refreshStatus();
  hideOverlay();
  state = 'playing';
}

// ── ↑키: 레벨 스킵 ───────────────────────────────────────────────
function triggerLevelClear() {
  if (state !== 'playing') return;

  // 화면 플래시 텍스트
  const el = document.createElement('div');
  el.id = 'cheatFlash';
  el.textContent = '⚡ SKIP';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);

  levelClearPhotos[level] = currentIdolPhoto;
  level++;
  state = 'levelclear';
  refreshHUD();
  showKpopPhoto();
}

// ── 입력 ─────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();

  // ↑ 레벨 스킵 / ↓ 이전 단계 내비게이션
  if (e.code==='ArrowUp' && state==='playing') { triggerLevelClear(); return; }
  if (e.code==='ArrowDown') {
    // playing: 이전 레벨 클리어 사진 보기 (level > 1 이며 클리어 기록 있을 때)
    if (state==='playing' && level > 1 && levelClearPhotos[level-1] !== undefined)
      { showPhotoReplay(level-1); return; }
    // photoreplay: 사진에서 한 단계 더 내려가 실제 레벨 플레이로
    if (state==='photoreplay') { goBackToLevel(replayLvl); return; }
    return;
  }

  if (e.code==='Space') {
    if (state==='levelclear') return;
    if (state==='idle'||state==='over')  { newGame();          return; }
    if (state==='dead')                  { resumeAfterDeath(); return; }
    if (state==='playing') { state='paused'; showOverlay('⏸ PAUSED','SPACE 키로 재개','#6af4ff'); return; }
    if (state==='paused')  { state='playing'; hideOverlay(); return; }
  }
});
document.addEventListener('keyup', e => { keys[e.code]=false; });

// ── 터치 컨트롤 (모바일) ──────────────────────────────────────────
let _touchStartX = 0, _touchStartY = 0, _touchStartTime = 0;

function _canvasX(touch) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  return (touch.clientX - rect.left) * scaleX;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  _touchStartX = t.clientX; _touchStartY = t.clientY; _touchStartTime = Date.now();
  if (state === 'playing') paddle.x = Math.max(0, Math.min(W - paddle.w, _canvasX(t) - paddle.w / 2));
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state !== 'playing') return;
  const t = e.touches[0];
  paddle.x = Math.max(0, Math.min(W - paddle.w, _canvasX(t) - paddle.w / 2));
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const dt = Date.now() - _touchStartTime;
  const dy = (e.changedTouches[0]?.clientY ?? _touchStartY) - _touchStartY;
  const tap = dt < 300 && Math.abs(dy) < 20;
  const swipeUp = dy < -40;

  const swipeDown = dy > 40;
  if (swipeUp   && state === 'playing') { triggerLevelClear(); return; }
  if (swipeDown && state === 'playing' && level > 1 && levelClearPhotos[level-1] !== undefined)
    { showPhotoReplay(level-1); return; }

  if (tap) {
    if (state === 'idle' || state === 'over')  { newGame(); return; }
    if (state === 'dead')                       { resumeAfterDeath(); return; }
    if (state === 'paused')                     { state = 'playing'; hideOverlay(); return; }
    if (state === 'playing') {
      const allAttached = balls.every(b => b.attached);
      if (allAttached) { balls.forEach(b => b.attached = false); }
      else { state = 'paused'; showOverlay('⏸ PAUSED', '화면을 탭해서 재개', '#6af4ff'); }
      return;
    }
  }
}, { passive: false });

// ── 모바일 버튼 ──────────────────────────────────────────────────
const btnLeft=document.getElementById('btnLeft');
const btnRight=document.getElementById('btnRight');
const btnFire=document.getElementById('btnFire');
let _mLeft=false,_mRight=false;
function _mBtnOn(dir){ if(dir==='L')_mLeft=true; else _mRight=true; }
function _mBtnOff(dir){ if(dir==='L')_mLeft=false; else _mRight=false; }
['touchstart','mousedown'].forEach(ev=>{

  btnRight.addEventListener(ev, e=>{e.preventDefault();_mBtnOn('R');}, {passive:false});
});
['touchend','mouseup','touchcancel'].forEach(ev=>{
  btnLeft.addEventListener(ev,  e=>{e.preventDefault();_mBtnOff('L');}, {passive:false});
  btnRight.addEventListener(ev, e=>{e.preventDefault();_mBtnOff('R');}, {passive:false});
});
btnFire.addEventListener('touchend', e=>{ e.preventDefault();
  if(state==='idle'||state==='over') { newGame(); return; }
  if(state==='dead') { resumeAfterDeath(); return; }
  if(state==='paused') { state='playing'; hideOverlay(); return; }
  if(state==='playing'){ if(balls.every(b=>b.attached)) balls.forEach(b=>b.attached=false); else{ state='paused';showOverlay('⏸ PAUSED','화면 탭으로 재개','#6af4ff'); } }
}, {passive:false});
btnFire.addEventListener('mousedown', e=>{ e.preventDefault();
  if(state==='idle'||state==='over'){newGame();return;}
  if(state==='dead'){resumeAfterDeath();return;}
  if(state==='playing'){ if(balls.every(b=>b.attached)) balls.forEach(b=>b.attached=false); }
}, {passive:false});
// 모바일 패들 이동을 update에 반영
// 모바일 버튼 패들 이동 — 16ms 루프
const _mPatch=setInterval(()=>{
  if(_mLeft && state==='playing')  paddle.x=Math.max(0,paddle.x-paddle.speed);
  if(_mRight && state==='playing') paddle.x=Math.min(W-paddle.w,paddle.x+paddle.speed);
},16);

// 사진 오버레이 터치 — 스와이프↓ 감지
let _overlayTY = 0;
photoOverlay.addEventListener('touchstart', e => { _overlayTY = e.touches[0]?.clientY ?? 0; }, { passive:true });
photoOverlay.addEventListener('touchend', e => {
  e.preventDefault();
  const dy = (e.changedTouches[0]?.clientY ?? _overlayTY) - _overlayTY;
  const swipeDown = dy > 40;

  if (state === 'photoreplay') {
    if (swipeDown) goBackToLevel(replayLvl);   // ↓ 스와이프: 레벨 복귀
    else _closePhotoReplay();                   // 탭: 현재 레벨로
    return;
  }
  if (state !== 'levelclear') return;
  photoOverlay.classList.add('hidden');
  initLevel(); hideOverlay(); state = 'playing';
}, { passive: false });

function newGame() {
  score=0; level=1; lives=3;
  persist = { ...PERSIST_DEFAULT };
  levelClearPhotos = {};
  _usedPhotoUrls.clear(); _nextPhoto = null; _nextLoading = false;
  resetCombo(); updateHiScore();
  initLevel(); hideOverlay(); state='playing';
}
function resumeAfterDeath() {
  resetBallOnly(); hideOverlay(); state='playing';
}

// ── 아이템 ───────────────────────────────────────────────────────
const ITEM_DEFS = [
  { type:'MULTIBALL', icon:'+2',  color:'#44ff90' },
  { type:'PIERCE',    icon:'⇒⇒', color:'#ffd200' },  // 관통볼: 첫 충돌 블럭 무시하고 통과
  { type:'WIDE',      icon:'⟷+',  color:'#c084fc' },  // 플레이어 폭 증가
];

function trySpawnItem(bx, by) {
  if (Math.random()>=.04) return;
  const d=ITEM_DEFS[Math.floor(Math.random()*ITEM_DEFS.length)];
  items.push({ x:bx-22, y:by-10, w:44, h:20, vy:1.8, ...d });
}

function applyItem(it) {
  if (it.type==='MULTIBALL') {
    const ex=[];
    for (const b of balls) {
      if (b.attached) continue;
      for (let i=0;i<2;i++) {
        const a=Math.atan2(b.vy,b.vx)+(i===0?.45:-.45), spd=Math.hypot(b.vx,b.vy);
        // 새 볼도 현재 persist 효과 상속
        ex.push({ x:b.x, y:b.y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
                  r:persist.ballR, attached:false, trail:[], pierce:persist.pierce });
      }
    }
    balls.push(...ex.slice(0,Math.max(0,8-balls.length)));

  } else if (it.type==='PIERCE') {
    // 볼 크기 +3 (시각) + 관통 충전 +3 → 레벨 지속
    const newR=Math.min((persist.ballR)+3,20);
    persist.ballR=newR;
    persist.pierce=Math.min(persist.pierce+3,9);
    for (const b of balls){ b.r=newR; b.pierce=(b.pierce||0)+3; }

  } else if (it.type==='WIDE') {
    // 플레이어(패들) 폭 +44 → 레벨 지속
    const newW=Math.min(paddle.w+44,220);
    paddle.w=newW; paddle.x=Math.min(paddle.x, W-newW);
    persist.paddleW=newW;
  }
  spawnItemParticles(it.x+it.w/2, it.y+it.h/2, it.color);
  sfx('item'); refreshHUD(); refreshStatus();
}

// ── 파티클 ───────────────────────────────────────────────────────
function spawnParticles(cx,cy,color,n=12) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=1.5+Math.random()*4;
    particles.push({ x:cx,y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s-1, r:1.5+Math.random()*2.5, life:1, color });
  }
}
function spawnItemParticles(cx,cy,color) {
  for (let i=0;i<20;i++) {
    const a=Math.random()*Math.PI*2, s=1+Math.random()*5;
    particles.push({ x:cx,y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2.5, r:2+Math.random()*3, life:1.4, color });
  }
}
function updateParticles(dt) {
  particles=particles.filter(p=>p.life>0);
  for (const p of particles) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=.09*dt; p.life-=.032*dt; }
}

// ── 업데이트 ─────────────────────────────────────────────────────
function update(dt) {
  // 패들
  if (keys['ArrowLeft'])  paddle.x=Math.max(0,paddle.x-paddle.speed*dt);
  if (keys['ArrowRight']) paddle.x=Math.min(W-paddle.w,paddle.x+paddle.speed*dt);

  // 부착 볼 → SPACE로만 발사 (↑↓ 는 치트로 사용)
  if (balls.every(b=>b.attached)) {
    const cx=paddle.x+paddle.w/2;
    for (const b of balls) { b.x=cx; b.y=paddle.y-b.r-1; }
    if (keys['Space']) for (const b of balls) b.attached=false;
  }

  for (const b of balls) {
    if (b.attached) continue;
    b.x+=b.vx*dt; b.y+=b.vy*dt;
    if (b.x-b.r<0)  { b.x=b.r;     b.vx= Math.abs(b.vx); sfx('wall'); }
    if (b.x+b.r>W)  { b.x=W-b.r;   b.vx=-Math.abs(b.vx); sfx('wall'); }
    if (b.y-b.r<0)  { b.y=b.r;     b.vy= Math.abs(b.vy); sfx('wall'); }

    const tolY=Math.abs(b.vy)*dt+2;
    if (b.vy>0 && b.x>paddle.x-b.r && b.x<paddle.x+paddle.w+b.r
        && b.y+b.r>=paddle.y && b.y+b.r<=paddle.y+paddle.h+tolY) {
      b.y=paddle.y-b.r;
      const rel=(b.x-(paddle.x+paddle.w/2))/(paddle.w/2);
      const a2=rel*(Math.PI/3), spd=Math.hypot(b.vx,b.vy);
      b.vx=Math.sin(a2)*spd; b.vy=-Math.abs(Math.cos(a2)*spd);
      sfx('paddle');
    }

    for (const br of bricks) {
      if (!br.alive) continue;
      const cx2=Math.max(br.x,Math.min(b.x,br.x+br.w));
      const cy2=Math.max(br.y,Math.min(b.y,br.y+br.h));
      const dx=b.x-cx2, dy=b.y-cy2;
      if (dx*dx+dy*dy<b.r*b.r) {
        br.alive=false;
        addCombo();
        const mult=Math.max(1,Math.ceil(combo/3));
        score+=10*level*mult;
        updateHiScore();
        spawnParticles(br.x+br.w/2,br.y+br.h/2,br.pal.main,14);
        trySpawnItem(br.x+br.w/2,br.y+br.h/2);
        sfx('brick');
        const aliveCnt=bricks.filter(x=>x.alive).length;
        if(aliveCnt>0 && (bricks.length-aliveCnt)%4===0){
          const cap=4.4+(level-1)*0.55;
          for(const bb of balls){ const spd2=Math.hypot(bb.vx,bb.vy); if(spd2<cap*1.6){const s=spd2*1.03/spd2;bb.vx*=s;bb.vy*=s;} }
        }
        if (b.pierce>0) {
          // ── 관통: 방향 유지하며 통과, 황금 파티클 ──
          b.pierce--;
          spawnParticles(br.x+br.w/2,br.y+br.h/2,'#ffd200',10);
          // break 없음 → 다음 벽돌도 검사
        } else {
          if (b.r-Math.abs(dx)<b.r-Math.abs(dy)) b.vx=dx>0?Math.abs(b.vx):-Math.abs(b.vx);
          else                                    b.vy=dy>0?Math.abs(b.vy):-Math.abs(b.vy);
          break;
        }
      }
    }
    // 트레일 기록
    if(!b.trail) b.trail=[];
    b.trail.unshift({x:b.x,y:b.y});
    if(b.trail.length>TRAIL) b.trail.length=TRAIL;
  }

  // 낙구 처리
  const prev=balls.length;
  balls=balls.filter(b=>b.y-b.r<H);
  if (balls.length!==prev) refreshHUD();

  if (balls.length===0) {
    lives--; refreshHUD(); resetCombo(); updateHiScore(); shake=10;
    sfx(lives<=0?'over':'death');
    if (lives<=0) {
      state='over';
      showOverlay('GAME OVER',`SCORE  ${score}\nBEST  ${hiScore}\nSPACE / 탭 재시작`,'#ff4d6d');
      return;
    }
    // 라이프 잃어도 게임 멈추지 않고 공만 패들에 재장착
    const hadEffects = persist.pierce > 0 || persist.paddleW > PERSIST_DEFAULT.paddleW;
    persist = { ...PERSIST_DEFAULT };
    initPaddle();
    balls = [spawnStartBall()];
    items = []; particles = [];
    if (hadEffects) flashEffect('✗ EFFECTS LOST', '#ff6b6b');
    else flashEffect(`💥 MISS  ❤×${lives}`, '#ff9f1c');
    refreshHUD(); refreshStatus();
    // state는 'playing' 유지 — 바로 이동하며 SPACE로 발사 가능
    return;
  }

  // 레벨 클리어
  if (bricks.every(b=>!b.alive)) {
    levelClearPhotos[level] = currentIdolPhoto;
    level++; state='levelclear'; refreshHUD();
    resetCombo(); sfx('clear'); showKpopPhoto(); return;
  }

  // 아이템
  items=items.filter(it=>it.y<H+40);
  for (const it of items) {
    it.y+=it.vy*dt;
    if (it.y+it.h>=paddle.y && it.y<=paddle.y+paddle.h+it.vy*dt+2
        && it.x+it.w>=paddle.x && it.x<=paddle.x+paddle.w) {
      applyItem(it); it.y=H+200;
    }
  }
  scoreEl.textContent=score;
  updateParticles(dt);
}

// ── 배경 (캐시) ──────────────────────────────────────────────────
let bgCache=null;
function buildBG() {
  const off=document.createElement('canvas');
  off.width=W; off.height=H;
  const oc=off.getContext('2d');
  oc.clearRect(0,0,W,H);   // 투명 시작 → 반투명 레이어 합성 가능

  // 반투명 그라디언트 → 블러 배경사진이 캔버스를 통해 비쳐 보임
  const gb=oc.createLinearGradient(0,0,0,H);
  gb.addColorStop(0,'rgba(21,10,44,0.18)');
  gb.addColorStop(.5,'rgba(12,12,32,0.22)');
  gb.addColorStop(1,'rgba(7,7,16,0.30)');
  oc.fillStyle=gb; oc.fillRect(0,0,W,H);

  const ceilBot=PAD_TOP+ROWS*(BH+BGAP)+BGAP+12;
  oc.strokeStyle='rgba(90,70,200,.05)'; oc.lineWidth=1;
  for (let x=0;x<=W;x+=40) { oc.beginPath(); oc.moveTo(x,0); oc.lineTo(x,ceilBot); oc.stroke(); }
  for (let y=0;y<=ceilBot;y+=30) { oc.beginPath(); oc.moveTo(0,y); oc.lineTo(W,y); oc.stroke(); }

  const vx=W/2, vy=ceilBot;
  for (let x=0;x<=W;x+=40) {
    oc.strokeStyle='rgba(70,50,180,.06)';
    oc.beginPath(); oc.moveTo(vx+(x-vx)*.05,vy); oc.lineTo(x,H); oc.stroke();
  }
  for (let y=vy;y<=H;y+=28) {
    const t=(y-vy)/(H-vy);
    oc.strokeStyle=`rgba(70,50,180,${.025+t*.06})`;
    oc.beginPath(); oc.moveTo(0,y); oc.lineTo(W,y); oc.stroke();
  }

  const vg=oc.createRadialGradient(W/2,H/2,H*.1,W/2,H/2,H*.85);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.15)');
  oc.fillStyle=vg; oc.fillRect(0,0,W,H);

  const ag=oc.createRadialGradient(W/2,PAD_TOP+30,0,W/2,PAD_TOP+30,W*.7);
  ag.addColorStop(0,'rgba(140,80,255,.06)'); ag.addColorStop(1,'rgba(0,0,0,0)');
  oc.fillStyle=ag; oc.fillRect(0,0,W,H);
  return off;
}

// ── 그리기 ───────────────────────────────────────────────────────
function drawBrick(b) {
  const {x,y,w,h,pal}=b; const bv=5;
  ctx.shadowColor='rgba(0,0,0,.55)'; ctx.shadowBlur=8; ctx.shadowOffsetX=3; ctx.shadowOffsetY=4;
  const g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,pal.top); g.addColorStop(.45,pal.main); g.addColorStop(1,pal.side);
  ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
  ctx.shadowColor='transparent'; ctx.shadowBlur=ctx.shadowOffsetX=ctx.shadowOffsetY=0;
  ctx.fillStyle='rgba(255,255,255,.58)'; ctx.fillRect(x,y,w,bv);
  ctx.fillStyle='rgba(255,255,255,.26)'; ctx.fillRect(x,y+bv,bv,h-bv);
  ctx.fillStyle='rgba(0,0,0,.40)';       ctx.fillRect(x,y+h-bv,w,bv);
  ctx.fillStyle='rgba(0,0,0,.28)';       ctx.fillRect(x+w-bv,y+bv,bv,h-bv*2);
  const sl=ctx.createLinearGradient(x+10,0,x+w-10,0);
  sl.addColorStop(0,'rgba(255,255,255,0)'); sl.addColorStop(.5,'rgba(255,255,255,.18)'); sl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sl; ctx.fillRect(x+10,y+7,w-20,4);
  ctx.shadowColor=pal.glow; ctx.shadowBlur=5;
  ctx.strokeStyle=pal.top+'66'; ctx.lineWidth=1;
  ctx.strokeRect(x+.5,y+.5,w-1,h-1); ctx.shadowBlur=0;
}

function drawPaddle() {
  const {x,y,w,h}=paddle; const dp=5,r=6;
  const isWide=(persist.paddleW>PERSIST_DEFAULT.paddleW);
  ctx.fillStyle=isWide?'#260840':'#082840';
  ctx.beginPath(); ctx.roundRect(x+dp,y+h,w-dp,dp,[0,0,r,r]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(x+w,y+dp,dp,h-dp,[0,r,r,0]); ctx.fill();
  const g=ctx.createLinearGradient(x,y,x,y+h);
  if(isWide){
    g.addColorStop(0,'#f0ddff'); g.addColorStop(.12,'#cc99f8');
    g.addColorStop(.55,'#8844cc'); g.addColorStop(1,'#4a1880');
    ctx.shadowColor='#c084fc99'; ctx.shadowBlur=22;
  } else {
    g.addColorStop(0,'#ddf4ff'); g.addColorStop(.12,'#88d8f8');
    g.addColorStop(.55,'#2288cc'); g.addColorStop(1,'#0d5888');
    ctx.shadowColor='#5ad8ff88'; ctx.shadowBlur=16;
  }
  ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,.72)';
  ctx.beginPath(); ctx.roundRect(x+10,y+2,w-20,3,2); ctx.fill();
}

function drawOneBall(b) {
  const piercing=(b.pierce>0);
  // 트레일
  if(b.trail){
    for(let i=b.trail.length-1;i>=0;i--){
      const t=b.trail[i], a=(1-(i+1)/TRAIL)*0.35;
      ctx.globalAlpha=a;
      ctx.fillStyle=piercing?'#ffd200':'#6af4ff';
      ctx.beginPath(); ctx.arc(t.x,t.y,b.r*(1-(i/TRAIL)*0.5),0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  const hx=b.x-b.r*.3, hy=b.y-b.r*.3;
  ctx.shadowColor=piercing?'rgba(255,200,0,.9)':'rgba(100,210,255,.75)';
  ctx.shadowBlur=b.r*2.2;
  const g=ctx.createRadialGradient(hx,hy,b.r*.04,b.x,b.y,b.r);
  if(piercing){
    g.addColorStop(0,'#ffffff'); g.addColorStop(.22,'#fff3aa');
    g.addColorStop(.6,'#ffaa00'); g.addColorStop(1,'#7a4000');
  } else {
    g.addColorStop(0,'#ffffff'); g.addColorStop(.22,'#c2eeff');
    g.addColorStop(.6,'#3abcf0'); g.addColorStop(1,'#0b4f75');
  }
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,.82)';
  ctx.beginPath(); ctx.ellipse(hx,hy,b.r*.26,b.r*.18,-Math.PI/5,0,Math.PI*2); ctx.fill();
}

function drawItem(it) {
  ctx.shadowColor=it.color; ctx.shadowBlur=14;
  ctx.fillStyle='rgba(4,4,18,.82)';
  ctx.beginPath(); ctx.roundRect(it.x,it.y,it.w,it.h,it.h/2); ctx.fill();
  ctx.strokeStyle=it.color; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.roundRect(it.x,it.y,it.w,it.h,it.h/2); ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle=it.color; ctx.font="bold 11px 'Courier New'";
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(it.icon,it.x+it.w/2,it.y+it.h/2);
}

function drawParticles() {
  ctx.shadowBlur=4;
  for (const p of particles) {
    if (p.life<=0) continue;
    ctx.globalAlpha=Math.max(0,Math.min(1,p.life));
    ctx.shadowColor=p.color; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

// ── 메인 루프 ─────────────────────────────────────────────────────
let last=0;
function loop(ts) {
  const dt=Math.min((ts-last)/16.67,3); last=ts;
  if (!bgCache) bgCache=buildBG();
  ctx.clearRect(0,0,W,H);
  // 화면 흔들림
  if(shake>0){ ctx.save(); ctx.translate((Math.random()-.5)*shake*2,(Math.random()-.5)*shake*1.2); shake*=0.75; if(shake<0.4)shake=0; }
  ctx.drawImage(bgCache,0,0);
  ctx.strokeStyle='rgba(255,255,255,.04)'; ctx.lineWidth=1;
  ctx.strokeRect(.5,.5,W-1,H-1);
  drawParticles();
  for (const b of bricks) if (b.alive) drawBrick(b);
  for (const it of items) drawItem(it);
  drawPaddle();
  for (const b of balls) drawOneBall(b);
  if (state==='playing') update(dt);
  if(shake>0) ctx.restore();
  requestAnimationFrame(loop);
}

// ── 시작 ─────────────────────────────────────────────────────────
initLevel();
state='idle';
requestAnimationFrame(loop);
</script>
